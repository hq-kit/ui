name: Cleanup Vercel Preview

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Get Preview URL from PR
        id: get-url
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const previewComment = comments.data.find(c =>
              c.body.includes('Preview ready:')
            );

            if (!previewComment) return null;

            const url = previewComment.body.split('\n')[1];
            core.setOutput('url', url);

      - name: Delete deployment
        if: steps.get-url.outputs.url != ''
        run: |
          vercel remove ${{ steps.get-url.outputs.url }} --yes --token=${{ secrets.VERCEL_TOKEN }}